<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#123379" />

    <!-- SEO -->
    <title>Hydrow — Hydration & Sleep Insights</title>
    <meta
      name="description"
      content="Hydrow helps you track hydration, sleep quality, and compare your performance against real athlete benchmarks with clean, modern analytics."
    />
    <meta
      name="keywords"
      content="hydration tracker, sleep tracker, athlete benchmarks, health analytics, wellness dashboard"
    />
    <meta name="author" content="Hydrow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Apple icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />

    <!-- Manifest (PWA) -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- OpenGraph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Hydrow — Hydration & Sleep Insights" />
    <meta
      property="og:description"
      content="Track hydration and sleep, view trends, and compare your performance with real athlete benchmarks."
    />
    <meta property="og:image" content="%PUBLIC_URL%/preview.png" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hydrow — Hydration & Sleep Insights" />
    <meta
      name="twitter:description"
      content="Hydrow helps you understand your hydration, sleep patterns, and athletic benchmarks."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/preview.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "WebApplication",
        "name": "Hydrow",
        "url": "https://yourdomain.com",
        "description": "Hydrow helps users track hydration, sleep quality, and benchmark their athletic performance with clean visual analytics.",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web Browser",
        "creator": {
          "@type": "Organization",
          "name": "Hydrow"
        }
      }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
